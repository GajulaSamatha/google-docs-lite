<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor | Google Docs Lite</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" rel="stylesheet" /> -->
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f6f8fc;
            --surface: #ffffff;
            --border: #d9dee8;
            --text: #172033;
            --muted: #667085;
            --blue: #2563eb;
            --blue-soft: #eff6ff;
            --green: #16a34a;
            --red: #dc2626;
            --shadow: 0 20px 55px rgba(15, 23, 42, 0.14);
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            color: var(--text);
            background:
                linear-gradient(135deg, rgba(66, 133, 244, 0.10), transparent 34%),
                linear-gradient(315deg, rgba(52, 168, 83, 0.10), transparent 38%),
                var(--bg);
        }

        .editor_page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-width: 0;
        }

        .editor_header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 84px;
            padding: 14px 28px;
            border-bottom: 1px solid rgba(112, 124, 151, 0.16);
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
        }

        .editor_identity {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
            flex: 1;
        }

        .doc_icon {
            position: relative;
            width: 38px;
            height: 44px;
            flex: 0 0 auto;
            border-radius: 7px;
            background: var(--surface);
            box-shadow: 0 8px 20px rgba(20, 34, 66, 0.14);
        }

        .doc_icon::before {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            border-top: 12px solid #dbe8ff;
            border-left: 12px solid transparent;
        }

        .doc_icon::after {
            content: "";
            position: absolute;
            top: 17px;
            left: 8px;
            right: 8px;
            height: 3px;
            border-radius: 999px;
            background: var(--blue);
            box-shadow: 0 8px 0 #34a853, 0 16px 0 #fbbc04;
        }

        .title_group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
            width: min(720px, 100%);
        }

        .title_label {
            color: var(--muted);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        #title {
            width: 100%;
            min-width: 0;
            border: 1px solid transparent;
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--text);
            background: transparent;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            outline: none;
        }

        #title:hover,
        #title:focus {
            border-color: var(--border);
            background: #ffffff;
        }

        .editor_actions {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 0 auto;
        }

        .status_chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 38px;
            padding: 0 12px;
            border: 1px solid rgba(22, 163, 74, 0.18);
            border-radius: 8px;
            color: #157347;
            background: #f0fdf4;
            font-size: 13px;
            font-weight: 800;
        }

        .status_chip::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 0 4px rgba(22, 163, 74, 0.12);
        }

        .header_link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 0 13px;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            background: #ffffff;
            font-size: 13px;
            font-weight: 800;
            text-decoration: none;
            transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
        }

        .header_link:hover {
            transform: translateY(-1px);
            border-color: rgba(37, 99, 235, 0.30);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.10);
        }

        .header_link.logout {
            color: var(--red);
            border-color: rgba(220, 38, 38, 0.20);
            background: #fff7f7;
        }

        .document_workspace {
            flex: 1;
            overflow-y: auto;
            padding: 28px 18px 48px;
        }

        .editor_toolbar {
            position: sticky;
            top: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: min(860px, 100%);
            min-height: 46px;
            margin: 0 auto 18px;
            padding: 8px;
            border: 1px solid rgba(217, 226, 242, 0.95);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        .tool_button {
            width: 32px;
            height: 30px;
            display: grid;
            place-items: center;
            border: 1px solid transparent;
            border-radius: 6px;
            color: #475467;
            background: transparent;
            font-size: 13px;
            font-weight: 800;
        }

        .tool_button.muted {
            width: auto;
            padding: 0 10px;
            color: var(--muted);
            font-weight: 700;
        }

        .tool_divider {
            width: 1px;
            height: 22px;
            background: var(--border);
        }

        .document_page {
            width: min(860px, 100%);
            min-height: 1100px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid rgba(112, 124, 151, 0.18);
            border-radius: 4px;
            box-shadow: var(--shadow);
            animation: pageIn 320ms ease both;
        }

        #editor {
            width: 100%;
            min-height: 1100px;
            border: none;
            padding: 72px 76px;
            outline: none;
            color: #1f2937;
            font-size: 16px;
            line-height: 1.75;
            overflow-wrap: anywhere;
        }

        #editor:focus {
            box-shadow: inset 0 0 0 2px rgba(37, 99, 235, 0.10);
        }

        #editor:empty::before {
            content: "Start writing...";
            color: #9aa3b2;
        }

        #pop_up {
            position: fixed;
            z-index: 20;
            top: 18px;
            right: 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: min(360px, calc(100vw - 36px));
            padding: 12px 14px;
            border: 1px solid rgba(220, 38, 38, 0.18);
            border-radius: 8px;
            background: #fff7f7;
            box-shadow: 0 14px 36px rgba(20, 34, 66, 0.14);
        }

        #close {
            width: 28px;
            height: 28px;
            flex: 0 0 auto;
            border: 1px solid rgba(220, 38, 38, 0.25);
            border-radius: 50%;
            color: #b42318;
            background: #ffffff;
            cursor: pointer;
            font-weight: 700;
        }

        #error {
            color: #b42318;
            font-size: 14px;
            line-height: 1.4;
        }

        @keyframes pageIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 1ms !important;
                transition-duration: 1ms !important;
            }
        }

        @media (max-width: 720px) {
            .editor_header {
                align-items: flex-start;
                flex-direction: column;
                padding: 12px 14px;
            }

            .editor_identity,
            .editor_actions {
                width: 100%;
            }

            .editor_actions {
                flex-wrap: wrap;
            }

            .status_chip {
                width: 100%;
                justify-content: center;
            }

            .header_link {
                flex: 1;
            }

            #title {
                font-size: 20px;
            }

            .document_workspace {
                padding: 18px 10px 30px;
            }

            .document_page,
            #editor {
                min-height: calc(100vh - 132px);
            }

            #editor {
                padding: 34px 24px;
                font-size: 15px;
            }

            .editor_toolbar {
                overflow-x: auto;
                justify-content: flex-start;
            }
        }
    </style>
</head>
<body>
    <div id="pop_up" style="display:none">
        <button id="close">X</button>
        <p id="error"></p>
    </div>

    <main class="editor_page">
        <header class="editor_header">
            <div class="editor_identity">
                <span class="doc_icon" aria-hidden="true"></span>
                <div class="title_group">
                    <label class="title_label" for="title">Document title</label>
                    <input
                        id="title"
                        type="text"
                        placeholder="Untitled document"
                    />
                </div>
            </div>
            <div class="editor_actions">
                <span class="status_chip">Autosave on</span>
                <a class="header_link" href="/menu.html">Menu</a>
                <a class="header_link logout" href="/login">Logout</a>
            </div>
        </header>

        <section class="document_workspace" aria-label="Document workspace">
            <!-- <div class="editor_toolbar" aria-label="Editor toolbar">
                <span class="tool_button muted">Text</span>
                <span class="tool_divider" aria-hidden="true"></span>
                <span class="tool_button">B</span>
                <span class="tool_button"><i>I</i></span>
                <span class="tool_button"><u>U</u></span>
                <span class="tool_divider" aria-hidden="true"></span>
                <span class="tool_button muted">100%</span>
            </div> -->
            <div class="document_page">
                <div id="editor" contenteditable="true"></div>
            </div>
        </section>
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <!-- Include the Quill library -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script> -->

    <script>

        const socket= io();
        const errorMssg=document.getElementById("error");
        const editor=document.getElementById("editor");
        const params = new URLSearchParams(window.location.search);
        const docId = params.get("id");

        if(!docId){
            alert("Document ID missing");
            throw new Error("Document ID missing");
        }
        let timer;
        let isRemoteUpdate=false;
        
        // // Initialize Quill editor -->
        // const quill = new Quill('#editor', {
        //     theme: 'snow'
        // });

        //hiding pop-up
        document.getElementById("close").addEventListener("click",()=>{
            document.getElementById("pop_up").style.display = "none";
        });

        socket.emit("join-document",docId);
        

        socket.emit("load-document",docId);
        async function loadDocument() {
            const response = await fetch(`/document/${docId}`);
            
            if(response.status==401){
                window.location.href = "./login.html";
                return;
            }
            const doc = await response.json();

            document.getElementById("title").value = doc.title;
            editor.innerHTML = doc.content;
        }

        loadDocument();
        
        socket.on("receive-changes",(content)=>{
            isRemoteUpdate=true;
            editor.innerHTML=content;
            isRemoteUpdate=false;
        });

        //400
        socket.on("bad-request",(error)=>{
            errorMssg.textContent="Something went wrong, try again!";
            document.getElementById("pop_up").style.display = "";
        });
        //404
        socket.on("not-found",(error)=>{
            errorMssg.textContent="Not found!";
            document.getElementById("pop_up").style.display = "";
        })
        //500
        socket.on("server-error",(error)=>{
            errorMssg.textContent="Connect after sometime!!";
            document.getElementById("pop_up").style.display = "";
        });
        editor.addEventListener('input', () => {

            if(isRemoteUpdate) return;
            // realtime sync
            socket.emit("send-changes", {
                docId,
                content: editor.innerHTML
            });

            // prevent multiple save timers
            clearTimeout(timer);

            // autosave
            timer = setTimeout(() => {

                socket.emit("auto-save", {
                    docId,
                    content: editor.innerHTML
                });
            }, 2000);
        });

    </script>
</body>
</html>
