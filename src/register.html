<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Google Docs Lite</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #172033;
            background:
                linear-gradient(135deg, rgba(66, 133, 244, 0.10), transparent 35%),
                linear-gradient(315deg, rgba(52, 168, 83, 0.12), transparent 38%),
                #f6f8fc;
        }

        #container {
            min-height: 100vh;
            width: 100%;
            display: grid;
            place-items: center;
            padding: 32px 18px;
        }

        .auth_shell {
            width: min(940px, 100%);
            min-height: 560px;
            display: grid;
            grid-template-columns: 1fr 440px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(112, 124, 151, 0.18);
            border-radius: 24px;
            box-shadow: 0 24px 70px rgba(45, 57, 91, 0.18);
        }

        .brand_panel {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 44px;
            color: #ffffff;
            background:
                linear-gradient(140deg, rgba(26, 115, 232, 0.92), rgba(24, 90, 188, 0.88)),
                url("data:image/svg+xml,%3Csvg width='320' height='320' viewBox='0 0 320 320' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23ffffff' stroke-opacity='.18' stroke-width='2'%3E%3Cpath d='M40 58h128l38 40v164H40z'/%3E%3Cpath d='M168 58v40h38'/%3E%3Cpath d='M74 132h98M74 164h128M74 196h106'/%3E%3C/g%3E%3C/svg%3E");
            background-size: cover, 360px;
            background-position: center, center;
        }

        .brand_mark {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .doc_icon {
            width: 44px;
            height: 52px;
            position: relative;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        }

        .doc_icon::before {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            border-top: 14px solid #d7e6ff;
            border-left: 14px solid transparent;
        }

        .doc_icon::after {
            content: "";
            position: absolute;
            left: 10px;
            right: 10px;
            top: 20px;
            height: 4px;
            border-radius: 10px;
            background: #4285f4;
            box-shadow: 0 10px 0 #34a853, 0 20px 0 #fbbc04;
        }

        .brand_copy h1 {
            max-width: 340px;
            font-size: 38px;
            line-height: 1.12;
            font-weight: 800;
            letter-spacing: 0;
        }

        .brand_copy p {
            max-width: 330px;
            margin-top: 16px;
            color: rgba(255, 255, 255, 0.82);
            font-size: 16px;
            line-height: 1.65;
        }

        .form_panel {
            display: flex;
            align-items: center;
            padding: 44px;
            background: #ffffff;
        }

        #register_form {
            width: 100%;
        }

        fieldset {
            border: 0;
        }

        legend {
            width: 100%;
            margin-bottom: 28px;
        }

        .form_title {
            display: block;
            color: #172033;
            font-size: 30px;
            font-weight: 800;
            line-height: 1.2;
        }

        .form_subtitle {
            display: block;
            margin-top: 8px;
            color: #667085;
            font-size: 15px;
            line-height: 1.5;
        }

        .input_group {
            margin-bottom: 18px;
        }

        .input_group.invalid input {
            border-color: #d92d20;
            background: #fffafa;
        }

        .input_group.invalid input:focus {
            border-color: #d92d20;
            box-shadow: 0 0 0 4px rgba(217, 45, 32, 0.14);
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #344054;
            font-size: 14px;
            font-weight: 700;
        }

        input {
            width: 100%;
            height: 48px;
            border: 1px solid #d0d5dd;
            border-radius: 12px;
            padding: 0 14px;
            color: #172033;
            background: #fbfcff;
            font-size: 15px;
            outline: none;
            transition: border-color 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
        }

        input:focus {
            border-color: #4285f4;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(66, 133, 244, 0.16);
        }

        .error_message {
            min-height: 18px;
            margin-top: 6px;
            color: #d92d20;
            font-size: 13px;
            line-height: 1.35;
        }

        .form_message {
            display: none;
            margin-bottom: 18px;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 14px;
            font-weight: 700;
            line-height: 1.4;
        }

        .form_message.success {
            display: block;
            color: #027a48;
            background: #ecfdf3;
            border: 1px solid #abefc6;
        }

        .form_message.error {
            display: block;
            color: #b42318;
            background: #fef3f2;
            border: 1px solid #fecdca;
        }

        button {
            width: 100%;
            height: 50px;
            margin-top: 8px;
            border: 0;
            border-radius: 12px;
            color: #ffffff;
            background: #1a73e8;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(26, 115, 232, 0.25);
            transition: transform 160ms ease, box-shadow 160ms ease, background-color 160ms ease;
        }

        button:hover {
            background: #185abc;
            box-shadow: 0 16px 30px rgba(26, 115, 232, 0.30);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .signin_text {
            margin-top: 20px;
            color: #667085;
            font-size: 14px;
            text-align: center;
        }

        .signin_text a {
            color: #1a73e8;
            font-weight: 700;
            text-decoration: none;
        }

        .signin_text a:hover {
            text-decoration: underline;
        }

        @media (max-width: 820px) {
            .auth_shell {
                grid-template-columns: 1fr;
                min-height: 0;
                border-radius: 20px;
            }

            .brand_panel {
                min-height: 260px;
                padding: 30px;
            }

            .brand_copy h1 {
                font-size: 30px;
            }

            .form_panel {
                padding: 30px;
            }
        }

        @media (max-width: 480px) {
            #container {
                padding: 18px 12px;
            }

            .brand_panel,
            .form_panel {
                padding: 24px;
            }

            .form_title {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <main id="container">
        <section class="auth_shell" aria-label="Registration">
            <div class="brand_panel">
                <div class="brand_mark">
                    <span class="doc_icon" aria-hidden="true"></span>
                    <span>Google Docs Lite</span>
                </div>
                <div class="brand_copy">
                    <h1>Create, edit, and save your documents.</h1>
                    <p>Start with a clean workspace for real-time writing and simple document management.</p>
                </div>
            </div>

            <div class="form_panel">
                <form id="register_form">
                    <fieldset>
                        <legend>
                            <span class="form_title">Create account</span>
                            <span class="form_subtitle">Enter your details to register.</span>
                        </legend>

                        <p id="form_message" class="form_message" aria-live="polite"></p>

                        <div class="input_group">
                            <label for="name">name</label>
                            <input name="name" type="text" id="name" autocomplete="name" required aria-describedby="name_error">
                            <p id="name_error" class="error_message" aria-live="polite"></p>
                        </div>

                        <div class="input_group">
                            <label for="email">Email address</label>
                            <input name="email" type="email" id="email" autocomplete="email" required aria-describedby="email_error">
                            <p id="email_error" class="error_message" aria-live="polite"></p>
                        </div>

                        <div class="input_group">
                            <label for="password">Password</label>
                            <input name="password" type="password" id="password" autocomplete="new-password" required aria-describedby="password_error">
                            <p id="password_error" class="error_message" aria-live="polite"></p>
                        </div>

                        <button type="submit">Register</button>
                        <p class="signin_text">Already have an account? <a href="/login">Login</a></p>
                    </fieldset>
                </form>
            </div>
        </section>
    </main>
    <script>
        const form = document.getElementById("register_form");
        const formMessage = document.getElementById("form_message");
        const fields = {
            name: document.getElementById("name"),
            email: document.getElementById("email"),
            password: document.getElementById("password")
        };

        const validators = {
            name(value) {
                const trimmedValue = value.trim();

                if (!trimmedValue) return "name is required.";
                if (trimmedValue.length < 3) return "name must be at least 3 characters.";
                if (trimmedValue.length > 20) return "name must be 20 characters or less.";
                if (!/^[a-zA-Z0-9_]+$/.test(trimmedValue)) {
                    return "Use only letters, numbers, and underscores.";
                }

                return "";
            },
            email(value) {
                const trimmedValue = value.trim();

                if (!trimmedValue) return "Email address is required.";
                if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmedValue)) {
                    return "Enter a valid email address.";
                }

                return "";
            },
            password(value) {
                if (!value) return "Password is required.";
                if (value.length < 8) return "Password must be at least 8 characters.";
                if (!/[A-Z]/.test(value)) return "Add at least one uppercase letter.";
                if (!/[a-z]/.test(value)) return "Add at least one lowercase letter.";
                if (!/[0-9]/.test(value)) return "Add at least one number.";

                return "";
            }
        };

        function setFieldError(input, message) {
            const group = input.closest(".input_group");
            const errorElement = document.getElementById(`${input.id}_error`);

            group.classList.toggle("invalid", Boolean(message));
            input.setAttribute("aria-invalid", String(Boolean(message)));
            errorElement.textContent = message;
        }

        function validateField(name) {
            const input = fields[name];
            const message = validators[name](input.value);

            setFieldError(input, message);
            return !message;
        }

        function validateForm() {
            return Object.keys(fields).every(validateField);
        }

        Object.keys(fields).forEach((name) => {
            fields[name].addEventListener("input", () => {
                validateField(name);
                formMessage.className = "form_message";
                formMessage.textContent = "";
            });

            fields[name].addEventListener("blur", () => validateField(name));
        });

        form.addEventListener("submit", (event) => {
            event.preventDefault();

            if (!validateForm()) {
                formMessage.className = "form_message error";
                formMessage.textContent = "Please fix the highlighted fields.";
                return;
            }

            fetch("/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    name: fields.name.value.trim(),
                    email: fields.email.value.trim(),
                    password: fields.password.value
                })
            })
            .then(async (response) => {
                const data = await response.json().catch(() => ({}));

                if (!response.ok) {
                    throw new Error(data.message || "Registration failed.");
                }

                formMessage.className = "form_message success";
                formMessage.textContent = data.message || "Registration details look good.";
                setTimeout(() => {
                    window.location.href = "/menu.html";
                }, 800);
                form.reset();
            })
            .catch((error) => {
                console.error("Register error:", error);
                formMessage.className = "form_message error";
                formMessage.textContent = error.message || "Registration failed.";
            });
        });
    </script>
</body>
</html>
